<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>One Ultra Screens — Event Dashboard 2026</title>
<link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;600;700;800&family=Cinzel:wght@700&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Sarabun', sans-serif; background: #f5f0eb; color: #2a1a10; min-height: 100vh; }

.header {
  background: linear-gradient(160deg, #ffffff 0%, #fdf8f3 60%, #ffffff 100%);
  border-bottom: 2px solid #c9a87a;
  padding: 0 32px;
  position: sticky; top: 0; z-index: 100;
  box-shadow: 0 4px 20px rgba(160,100,40,0.15);
}
.header-top { display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 16px; padding: 16px 0 12px; border-bottom: 1px solid #e8d8c0; }
.logo-area { display: flex; align-items: center; gap: 14px; }
.brand-name { font-family: 'Cinzel', serif; font-size: 17px; font-weight: 700; background: linear-gradient(135deg, #8b5e1a, #c9904c, #7a4e14); -webkit-background-clip: text; -webkit-text-fill-color: transparent; letter-spacing: 1.5px; line-height: 1.2; }
.brand-sub { font-size: 11px; color: #a07840; letter-spacing: 2px; text-transform: uppercase; margin-top: 2px; }
.header-right { text-align: right; }
.header-title { font-size: 12px; color: #a07840; }
.header-count { font-size: 22px; font-weight: 800; color: #8b4a1a; line-height: 1; }

.filter-bar { display: flex; gap: 12px; flex-wrap: wrap; align-items: flex-start; padding: 12px 0 10px; }
.filter-group { display: flex; flex-direction: column; gap: 4px; }
.filter-label { font-size: 10px; color: #a07840; letter-spacing: 1px; text-transform: uppercase; font-weight: 700; }

.multi-select { position: relative; }
.ms-trigger { background: #ffffff; border: 1.5px solid #d4a870; border-radius: 8px; color: #6b3a10; padding: 7px 34px 7px 12px; font-size: 12px; font-family: 'Sarabun',sans-serif; cursor: pointer; min-width: 140px; text-align: left; position: relative; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; transition: border-color 0.2s; box-shadow: 0 1px 4px rgba(0,0,0,0.06); }
.ms-trigger:hover { border-color: #8b5e1a; }
.ms-trigger::after { content: '▾'; position: absolute; right: 10px; top: 50%; transform: translateY(-50%); color: #c9904c; font-size: 11px; }
.ms-dropdown { display: none; position: absolute; top: calc(100% + 4px); left: 0; min-width: 190px; background: #ffffff; border: 1.5px solid #d4a870; border-radius: 10px; box-shadow: 0 8px 30px rgba(0,0,0,0.12); z-index: 200; overflow: hidden; }
.ms-dropdown.open { display: block; }
.ms-option { display: flex; align-items: center; gap: 8px; padding: 9px 14px; cursor: pointer; font-size: 12px; color: #5a3010; transition: background 0.15s; }
.ms-option:hover { background: #fdf0e0; }
.ms-option input[type=checkbox] { accent-color: #c9904c; width: 14px; height: 14px; }
.ms-option.all-opt { border-bottom: 1px solid #e8d8c0; font-weight: 700; color: #8b5e1a; }

.search-input { background: #ffffff; border: 1.5px solid #d4a870; border-radius: 8px; color: #5a3010; padding: 7px 12px; font-size: 12px; font-family: 'Sarabun',sans-serif; width: 200px; outline: none; transition: border-color 0.2s; box-shadow: 0 1px 4px rgba(0,0,0,0.06); }
.search-input:focus { border-color: #8b5e1a; }
.search-input::placeholder { color: #c0a080; }

/* Status filter toggle */
.status-toggle { display: flex; gap: 6px; align-items: center; flex-wrap: wrap; }
.stbtn { background: #ffffff; border: 1.5px solid #d4a870; border-radius: 20px; padding: 5px 14px; font-size: 11px; font-family: 'Sarabun',sans-serif; cursor: pointer; color: #8b5e1a; font-weight: 600; transition: all 0.2s; }
.stbtn.active { background: #8b5e1a; color: #fff; border-color: #8b5e1a; }
.stbtn:hover:not(.active) { background: #fdf0e0; }

.active-chips { display: flex; gap: 6px; flex-wrap: wrap; align-items: center; padding-bottom: 8px; min-height: 26px; }
.chip { background: #c9904c22; border: 1px solid #c9904c66; border-radius: 20px; padding: 2px 10px; font-size: 11px; color: #7a4a10; cursor: pointer; display: flex; align-items: center; gap: 5px; }
.chip:hover { background: #c9904c33; }
.chip-x { font-size: 12px; color: #c9904c; }
.chip-clear { background: #fce8e8; border-color: #e08080; color: #c05050; }

.tabs { display: flex; }
.tab-btn { background: none; border: none; cursor: pointer; padding: 10px 22px; font-size: 13px; font-family: 'Sarabun',sans-serif; color: #b09070; border-bottom: 2px solid transparent; transition: all 0.2s; }
.tab-btn.active { color: #8b5e1a; border-bottom-color: #c9904c; font-weight: 700; }
.tab-btn:hover:not(.active) { color: #8b5e1a; }

.content { padding: 24px 32px; }
.tab-panel { display: none; }
.tab-panel.active { display: block; }

/* Cards */
.card { background: #ffffff; border: 1px solid #e8d8c0; border-radius: 14px; padding: 20px 24px; box-shadow: 0 2px 12px rgba(160,100,40,0.08); }
.card-title { font-weight: 700; margin-bottom: 16px; font-size: 13px; color: #7a4a14; letter-spacing: 0.5px; }

.kpi-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(155px,1fr)); gap: 14px; margin-bottom: 22px; }
.kpi-card { background: #ffffff; border: 1px solid #e8d8c0; border-radius: 12px; padding: 16px 18px; position: relative; overflow: hidden; box-shadow: 0 2px 10px rgba(160,100,40,0.08); }
.kpi-card::before { content:''; position:absolute; top:0; left:0; right:0; height:3px; background:linear-gradient(90deg, transparent, var(--accent), transparent); }
.kpi-icon { font-size: 22px; margin-bottom: 8px; }
.kpi-value { font-size: 21px; font-weight: 800; color: var(--accent); line-height: 1; }
.kpi-unit { font-size: 10px; color: var(--accent); opacity: 0.7; margin-top: 2px; }
.kpi-label { font-size: 11px; color: #a07840; margin-top: 5px; }

/* Upcoming banner */
.upcoming-banner { background: linear-gradient(135deg, #fff8f0, #fdecd8); border: 1.5px solid #e8b870; border-radius: 12px; padding: 14px 18px; margin-bottom: 22px; }
.upcoming-title { font-size: 13px; font-weight: 700; color: #8b5e1a; margin-bottom: 10px; }
.upcoming-item { display: flex; align-items: center; gap: 10px; padding: 6px 0; border-bottom: 1px solid #f0e0c8; }
.upcoming-item:last-child { border-bottom: none; }
.upcoming-dot { width: 8px; height: 8px; border-radius: 50%; background: #c9904c; flex-shrink: 0; }
.upcoming-date { font-size: 11px; color: #c9904c; font-weight: 700; white-space: nowrap; min-width: 45px; }
.upcoming-name { font-size: 12px; color: #5a3010; flex: 1; }
.upcoming-venue { font-size: 11px; color: #a07840; }

.bar-chart { display: flex; align-items: flex-end; gap: 6px; height: 130px; }
.bar-col { flex: 1; display: flex; flex-direction: column; align-items: center; gap: 3px; }
.bar-label-top { font-size: 9px; color: #a07840; text-align: center; }
.bar-wrap { width: 100%; background: #f0e8d8; border-radius: 4px 4px 0 0; height: 95px; display: flex; align-items: flex-end; }
.bar-fill { width: 100%; background: linear-gradient(180deg, #e8a060, #8b5e1a); border-radius: 4px 4px 0 0; transition: height 0.6s ease; }
.bar-month { font-size: 9px; color: #a07840; }

.mini-bar-wrap { background: #f0e8d8; border-radius: 3px; overflow: hidden; height: 5px; width: 100%; }
.mini-bar-fill { height: 100%; border-radius: 3px; transition: width 0.5s ease; }

.top-event { display: flex; align-items: flex-start; gap: 12px; margin-bottom: 14px; padding-bottom: 14px; border-bottom: 1px solid #f0e0c8; }
.top-event:last-child { border-bottom: none; margin-bottom: 0; padding-bottom: 0; }
.top-event-name { font-size: 13px; color: #3a2010; font-weight: 600; margin-bottom: 5px; line-height: 1.3; }
.top-event-sub { font-size: 11px; color: #a07840; margin-top: 3px; }
.top-event-amount { font-size: 13px; color: #8b5e1a; font-weight: 800; white-space: nowrap; }

.month-group { background: #ffffff; border: 1px solid #e8d8c0; border-radius: 12px; padding: 16px 20px; margin-bottom: 14px; box-shadow: 0 2px 8px rgba(160,100,40,0.06); }
.month-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
.month-name { font-size: 15px; font-weight: 700; color: #8b5e1a; }
.month-meta { font-size: 12px; color: #a07840; margin-left: 8px; }
.month-revenue { font-size: 14px; font-weight: 800; color: #c9904c; }
.event-row { display: flex; justify-content: space-between; align-items: center; padding: 8px 0; border-bottom: 1px solid #f5ece0; }
.event-row:last-child { border-bottom: none; }
.event-row.is-upcoming { background: linear-gradient(90deg, #fffaf5, transparent); border-radius: 6px; padding: 8px 6px; }
.event-name { font-size: 12px; color: #3a2010; line-height: 1.3; }
.event-meta { font-size: 11px; color: #a07840; margin-top: 2px; }
.event-revenue { color: #8b5e1a; font-weight: 700; font-size: 13px; white-space: nowrap; }
.event-free { color: #c0a880; font-size: 12px; }
.event-seats { font-size: 11px; color: #a07840; }

.upcoming-tag { background: #fff3e0; border: 1px solid #e8b870; color: #c9700c; border-radius: 10px; font-size: 10px; padding: 1px 7px; margin-left: 6px; font-weight: 700; }
.badge { padding: 2px 8px; border-radius: 20px; font-size: 10px; display: inline-block; margin-left: 6px; font-weight: 600; }

.breakdown-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 18px; }
.col-full { grid-column: 1 / -1; }
.breakdown-item { margin-bottom: 14px; }
.breakdown-item:last-child { margin-bottom: 0; }
.breakdown-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 5px; }
.breakdown-name { font-size: 12px; font-weight: 600; }
.breakdown-count { font-size: 11px; color: #a07840; }
.breakdown-amount { font-size: 11px; color: #8b5e1a; margin-top: 4px; }

.venue-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px,1fr)); gap: 10px; }
.venue-card { background: #fdf8f3; border-radius: 10px; padding: 12px 14px; border: 1px solid #e8d8c0; }
.venue-name { font-size: 12px; color: #a07840; font-weight: 600; margin-bottom: 6px; }
.venue-revenue { font-size: 18px; font-weight: 800; color: #8b5e1a; }
.venue-count { font-size: 11px; color: #a07840; margin-top: 2px; }

.revenue-split { display: grid; grid-template-columns: repeat(3,1fr); gap: 14px; }
.split-item { text-align: center; }
.split-amount { font-size: 19px; font-weight: 800; }
.split-label { font-size: 11px; color: #a07840; margin: 5px 0 6px; }
.split-pct { font-size: 13px; font-weight: 700; margin-bottom: 6px; }

.tbl-wrap { overflow-x: auto; }
table { width: 100%; border-collapse: collapse; font-size: 12px; }
thead tr { background: #fdf8f3; }
th { padding: 11px 13px; text-align: left; color: #a07840; font-weight: 700; white-space: nowrap; border-bottom: 2px solid #e8d8c0; letter-spacing: 0.5px; font-size: 11px; }
tbody tr { border-bottom: 1px solid #f5ece0; transition: background 0.15s; }
tbody tr:hover { background: #fdf8f3; }
tbody tr.upcoming-row { background: linear-gradient(90deg, #fffaf5, #fff); }
tbody tr.upcoming-row td:first-child { border-left: 3px solid #e8b070; }
td { padding: 9px 13px; }
tfoot tr { background: #fdf8f3; border-top: 2px solid #d4a870; }
.mb22 { margin-bottom: 22px; }
.mb14 { margin-bottom: 14px; }

@media (max-width:700px) {
  .breakdown-grid { grid-template-columns: 1fr; }
  .revenue-split { grid-template-columns: 1fr; }
  .header { padding: 0 16px; }
  .content { padding: 16px; }
}
</style>
</head>

];

const MONTHS_TH=["ม.ค.","ก.พ.","มี.ค.","เม.ย.","พ.ค.","มิ.ย.","ก.ค.","ส.ค.","ก.ย.","ต.ค.","พ.ย.","ธ.ค."];
const MONTHS_FULL=["มกราคม","กุมภาพันธ์","มีนาคม","เมษายน","พฤษภาคม","มิถุนายน","กรกฎาคม","สิงหาคม","กันยายน","ตุลาคม","พฤศจิกายน","ธันวาคม"];
const TYPE_COLOR={"เหมารอบ":"#5a8abf","เช่าโรง":"#c9904c","ฟรี":"#5aaa6a","สื่อ":"#9a7abf","ชมร่วม":"#e0a060","-":"#a09070"};
const DEPT_COLOR={"Marketing":"#c9904c","Operation":"#5a8abf","-":"#a09070","ไม่ระบุ":"#a09070"};
const fmt=n=>(n||0).toLocaleString("th-TH");
const isUpcoming=d=>d.date>=TODAY;

const state={month:new Set(["all"]),dept:new Set(["all"]),type:new Set(["all"]),venue:new Set(["all"]),search:"",status:"all"};

// populate venue
const vDrop=document.getElementById("ms-venue-drop");
[...new Set(RAW.map(d=>d.venue))].sort().forEach(v=>{const el=document.createElement("div");el.className="ms-option";el.dataset.val=v;el.innerHTML=`<input type="checkbox"> ${v}`;vDrop.appendChild(el);});
// populate month
const mDrop=document.getElementById("ms-month-drop");
MONTHS_FULL.forEach((m,i)=>{const el=document.createElement("div");el.className="ms-option";el.dataset.val=String(i+1);el.innerHTML=`<input type="checkbox"> ${m}`;mDrop.appendChild(el);});

function setupMS(tid,did,key,lbl){
  const tr=document.getElementById(tid),dr=document.getElementById(did),opts=dr.querySelectorAll(".ms-option");
  tr.addEventListener("click",e=>{e.stopPropagation();document.querySelectorAll(".ms-dropdown.open").forEach(d=>{if(d!==dr)d.classList.remove("open");});dr.classList.toggle("open");});
  opts.forEach(opt=>{opt.addEventListener("click",e=>{e.stopPropagation();const val=opt.dataset.val,cb=opt.querySelector("input"),s=state[key];
    if(val==="all"){s.clear();s.add("all");opts.forEach(o=>{o.querySelector("input").checked=o.dataset.val==="all";});}
    else{s.delete("all");opts[0].querySelector("input").checked=false;s.has(val)?(s.delete(val),cb.checked=false):(s.add(val),cb.checked=true);if(!s.size){s.add("all");opts[0].querySelector("input").checked=true;}}
    updateLbl(tr,s,lbl);updateChips();renderAll();});});
}
function updateLbl(tr,s,lbl){if(s.has("all")||!s.size){tr.textContent=lbl;return;}const v=[...s];tr.textContent=v.length<=2?v.join(", "):`${v[0]} +${v.length-1}`;}
setupMS("ms-month-trigger","ms-month-drop","month","ทุกเดือน");
setupMS("ms-dept-trigger","ms-dept-drop","dept","ทุกแผนก");
setupMS("ms-type-trigger","ms-type-drop","type","ทุกประเภท");
setupMS("ms-venue-trigger","ms-venue-drop","venue","ทุกโรง");
document.addEventListener("click",()=>document.querySelectorAll(".ms-dropdown.open").forEach(d=>d.classList.remove("open")));
document.getElementById("search").addEventListener("input",e=>{state.search=e.target.value.toLowerCase();updateChips();renderAll();});

// Status toggle
document.querySelectorAll(".stbtn").forEach(btn=>{btn.addEventListener("click",()=>{document.querySelectorAll(".stbtn").forEach(b=>b.classList.remove("active"));btn.classList.add("active");state.status=btn.dataset.status;updateChips();renderAll();});});

const TIDS={"month":"ms-month-trigger","dept":"ms-dept-trigger","type":"ms-type-trigger","venue":"ms-venue-trigger"};
const ALBL={"month":"ทุกเดือน","dept":"ทุกแผนก","type":"ทุกประเภท","venue":"ทุกโรง"};
const DIDS={"month":"ms-month-drop","dept":"ms-dept-drop","type":"ms-type-drop","venue":"ms-venue-drop"};
const MSH={"1":"ม.ค.","2":"ก.พ.","3":"มี.ค.","4":"เม.ย.","5":"พ.ค.","6":"มิ.ย.","7":"ก.ค.","8":"ส.ค.","9":"ก.ย.","10":"ต.ค.","11":"พ.ย.","12":"ธ.ค."};

function removeF(key,val){state[key].delete(val);if(!state[key].size)state[key].add("all");updateLbl(document.getElementById(TIDS[key]),state[key],ALBL[key]);document.querySelectorAll(`#${DIDS[key]} .ms-option`).forEach(o=>{o.querySelector("input").checked=state[key].has("all")?o.dataset.val==="all":state[key].has(o.dataset.val);});updateChips();renderAll();}

function updateChips(){
  const c=document.getElementById("active-chips");c.innerHTML="";
  const def=state.month.has("all")&&state.dept.has("all")&&state.type.has("all")&&state.venue.has("all")&&!state.search&&state.status==="all";
  if(def)return;
  if(!state.month.has("all"))[...state.month].forEach(v=>{const ch=mkChip(`เดือน: ${MSH[v]||v}`);ch.addEventListener("click",()=>removeF("month",v));c.appendChild(ch);});
  ["dept","type","venue"].forEach(k=>{if(!state[k].has("all"))[...state[k]].forEach(v=>{const lbs={"dept":"แผนก","type":"ประเภท","venue":"โรง"};const ch=mkChip(`${lbs[k]}: ${v}`);ch.addEventListener("click",()=>removeF(k,v));c.appendChild(ch);});});
  if(state.search){const ch=mkChip(`ค้นหา: "${state.search}"`);ch.addEventListener("click",()=>{state.search="";document.getElementById("search").value="";updateChips();renderAll();});c.appendChild(ch);}
  if(state.status!=="all"){const lbs={"past":"จัดแล้ว","upcoming":"ที่จะมาถึง"};const ch=mkChip(`สถานะ: ${lbs[state.status]}`);ch.addEventListener("click",()=>{state.status="all";document.querySelectorAll(".stbtn").forEach((b,i)=>{b.classList.toggle("active",i===0);});updateChips();renderAll();});c.appendChild(ch);}
  if(!def){const cl=document.createElement("div");cl.className="chip chip-clear";cl.innerHTML="✕ ล้างทั้งหมด";cl.addEventListener("click",()=>{["month","dept","type","venue"].forEach(k=>{state[k].clear();state[k].add("all");});state.search="";state.status="all";document.getElementById("search").value="";["ms-month-drop","ms-dept-drop","ms-type-drop","ms-venue-drop"].forEach(id=>{document.querySelectorAll(`#${id} .ms-option`).forEach((o,i)=>{o.querySelector("input").checked=i===0;});});["ms-month-trigger","ms-dept-trigger","ms-type-trigger","ms-venue-trigger"].forEach((id,i)=>{document.getElementById(id).textContent=["ทุกเดือน","ทุกแผนก","ทุกประเภท","ทุกโรง"][i];});document.querySelectorAll(".stbtn").forEach((b,i)=>b.classList.toggle("active",i===0));updateChips();renderAll();});c.appendChild(cl);}
}
function mkChip(txt){const ch=document.createElement("div");ch.className="chip";ch.innerHTML=`${txt} <span class="chip-x">×</span>`;return ch;}

function getFiltered(){
  return RAW.filter(d=>{
    const m=parseInt(d.date.split("-")[1]);
    if(!state.month.has("all")&&!state.month.has(String(m)))return false;
    if(!state.dept.has("all")&&!state.dept.has(d.dept))return false;
    if(!state.type.has("all")&&!state.type.has(d.type))return false;
    if(!state.venue.has("all")&&!state.venue.has(d.venue))return false;
    if(state.search&&!d.name.toLowerCase().includes(state.search)&&!d.owner.toLowerCase().includes(state.search))return false;
    if(state.status==="past"&&isUpcoming(d))return false;
    if(state.status==="upcoming"&&!isUpcoming(d))return false;
    return true;
  });
}

function miniBar(v,max,color){return `<div class="mini-bar-wrap"><div class="mini-bar-fill" style="width:${max>0?(v/max)*100:0}%;background:${color}"></div></div>`;}
function badge(t,c){return `<span class="badge" style="background:${c}20;color:${c};border:1px solid ${c}50">${t}</span>`;}

function renderOverview(data){
  const total=data.reduce((s,d)=>s+d.total,0);
  const paid=data.filter(d=>d.total>0),free=data.filter(d=>d.total===0).length;
  const avg=paid.length?paid.reduce((s,d)=>s+d.total,0)/paid.length:0;
  const seats=data.reduce((s,d)=>s+d.seats,0);
  const upcomingList=RAW.filter(d=>isUpcoming(d)).slice(0,5);
  const byMonth=Array.from({length:12},(_,i)=>{const mf=data.filter(d=>parseInt(d.date.split("-")[1])===i+1);return{month:MONTHS_TH[i],revenue:mf.reduce((s,d)=>s+d.total,0)};});
  const maxRev=Math.max(...byMonth.map(m=>m.revenue),1);
  const top5=[...data].filter(d=>d.total>0).sort((a,b)=>b.total-a.total).slice(0,5);
  const medals=["🥇","🥈","🥉","4️⃣","5️⃣"];

  document.getElementById("tab-overview").innerHTML=`
    <div class="kpi-grid mb22">
      ${[
        {label:"กิจกรรมทั้งหมด",value:data.length,unit:"งาน",icon:"🎬",color:"#c9904c"},
        {label:"รายได้รวม",value:"฿"+fmt(total),unit:"บาท",icon:"💰",color:"#8b5e1a"},
        {label:"มีรายได้",value:paid.length,unit:"งาน",icon:"✅",color:"#5aaa6a"},
        {label:"งานฟรี/สื่อ",value:free,unit:"งาน",icon:"🎟️",color:"#b07840"},
        {label:"ที่นั่งรวม",value:fmt(seats),unit:"ที่นั่ง",icon:"🪑",color:"#7a70bf"},
        {label:"ที่จะมาถึง",value:RAW.filter(d=>isUpcoming(d)).length,unit:"งาน",icon:"📅",color:"#e0900c"},
      ].map(c=>`<div class="kpi-card" style="--accent:${c.color}"><div class="kpi-icon">${c.icon}</div><div class="kpi-value">${c.value}</div><div class="kpi-unit">${c.unit}</div><div class="kpi-label">${c.label}</div></div>`).join("")}
    </div>
    ${upcomingList.length?`
    <div class="upcoming-banner mb22">
      <div class="upcoming-title">📅 กิจกรรมที่กำลังจะมาถึง</div>
      ${upcomingList.map(e=>`<div class="upcoming-item"><div class="upcoming-dot"></div><div class="upcoming-date">${e.date.slice(5).replace("-","/")}</div><div class="upcoming-name">${e.name}</div><div class="upcoming-venue">${e.venue}</div></div>`).join("")}
    </div>`:""}
    <div class="card mb14">
      <div class="card-title">📈 รายได้รายเดือน (บาท)</div>
      <div class="bar-chart">
        ${byMonth.map(m=>{const h=maxRev>0?(m.revenue/maxRev)*100:0;return`<div class="bar-col"><div class="bar-label-top">${m.revenue>0?(m.revenue/1000).toFixed(0)+"K":""}</div><div class="bar-wrap"><div class="bar-fill" style="height:${h}%"></div></div><div class="bar-month">${m.month}</div></div>`;}).join("")}
      </div>
    </div>
    <div class="card">
      <div class="card-title">🏆 Top กิจกรรมรายได้สูงสุด</div>
      ${top5.length===0?`<div style="color:#a07840;text-align:center;padding:20px">ไม่พบข้อมูล</div>`:top5.map((e,i)=>`
        <div class="top-event">
          <div style="font-size:20px;width:28px;text-align:center;flex-shrink:0">${medals[i]||"▪️"}</div>
          <div style="flex:1">
            <div class="top-event-name">${e.name}</div>
            <div style="display:flex;align-items:center;gap:8px;margin:5px 0">${miniBar(e.total,top5[0].total,"#c9904c")}<div class="top-event-amount">฿${fmt(e.total)}</div></div>
            <div class="top-event-sub">${e.venue} · ${e.date.slice(5).replace("-","/")} · ${e.owner}</div>
          </div>
        </div>`).join("")}
    </div>`;
}

function renderMonthly(data){
  let html="";
  for(let mi=0;mi<12;mi++){
    const md=data.filter(d=>parseInt(d.date.split("-")[1])===mi+1);
    if(!md.length)continue;
    html+=`<div class="month-group"><div class="month-header"><div><span class="month-name">${MONTHS_FULL[mi]}</span><span class="month-meta">${md.length} กิจกรรม</span></div><div class="month-revenue">฿${fmt(md.reduce((s,d)=>s+d.total,0))}</div></div>
    ${md.map(e=>`<div class="event-row${isUpcoming(e)?" is-upcoming":""}">
      <div style="flex:1"><div class="event-name">${e.name}${isUpcoming(e)?'<span class="upcoming-tag">📅 ที่จะมาถึง</span>':''}</div>
      <div class="event-meta">${e.date.slice(8)} · ${e.venue} · ${e.owner}${badge(e.type,TYPE_COLOR[e.type]||"#a09070")}${badge(e.dept,DEPT_COLOR[e.dept]||"#a09070")}</div></div>
      <div style="text-align:right;margin-left:16px;flex-shrink:0">${e.total>0?`<div class="event-revenue">฿${fmt(e.total)}</div>`:`<div class="event-free">–</div>`}${e.seats>0?`<div class="event-seats">${e.seats} ที่นั่ง</div>`:""}</div>
    </div>`).join("")}</div>`;
  }
  document.getElementById("tab-monthly").innerHTML=html||`<div style="color:#a07840;text-align:center;padding:60px">ไม่พบข้อมูล</div>`;
}

function renderBreakdown(data){
  const byType={},byDept={},byVenue={};
  data.forEach(d=>{[[d.type,byType],[d.dept,byDept],[d.venue,byVenue]].forEach(([k,o])=>{if(!o[k])o[k]={count:0,revenue:0};o[k].count++;o[k].revenue+=d.total;});});
  const maxT=Math.max(...Object.values(byType).map(d=>d.revenue),1),maxD=Math.max(...Object.values(byDept).map(d=>d.revenue),1);
  const ticket=data.reduce((s,d)=>s+d.ticket,0),service=data.reduce((s,d)=>s+d.service,0),snack=data.reduce((s,d)=>s+d.snack,0),st=ticket+service+snack;
  document.getElementById("tab-breakdown").innerHTML=`
    <div class="breakdown-grid">
      <div class="card"><div class="card-title">📂 แยกตามประเภท</div>${Object.entries(byType).sort((a,b)=>b[1].revenue-a[1].revenue).map(([t,d])=>`<div class="breakdown-item"><div class="breakdown-row"><span class="breakdown-name" style="color:${TYPE_COLOR[t]||"#a09070"}">${t}</span><span class="breakdown-count">${d.count} งาน</span></div>${miniBar(d.revenue,maxT,TYPE_COLOR[t]||"#a09070")}<div class="breakdown-amount">฿${fmt(d.revenue)}</div></div>`).join("")}</div>
      <div class="card"><div class="card-title">🏢 แยกตามแผนก</div>${Object.entries(byDept).sort((a,b)=>b[1].revenue-a[1].revenue).map(([dept,d])=>`<div class="breakdown-item"><div class="breakdown-row"><span class="breakdown-name" style="color:${DEPT_COLOR[dept]||"#a09070"}">${dept}</span><span class="breakdown-count">${d.count} งาน</span></div>${miniBar(d.revenue,maxD,DEPT_COLOR[dept]||"#a09070")}<div class="breakdown-amount">฿${fmt(d.revenue)}</div></div>`).join("")}</div>
      <div class="card col-full"><div class="card-title">🎭 แยกตามโรง</div><div class="venue-grid">${Object.entries(byVenue).sort((a,b)=>b[1].revenue-a[1].revenue).map(([v,d])=>`<div class="venue-card"><div class="venue-name">${v}</div><div class="venue-revenue">฿${(d.revenue/1000).toFixed(0)}K</div><div class="venue-count">${d.count} กิจกรรม</div></div>`).join("")}</div></div>
      <div class="card col-full"><div class="card-title">💸 สัดส่วนรายได้ตามหมวด</div><div class="revenue-split">${[{label:"ค่าบัตรภาพยนตร์",value:ticket,color:"#c9904c"},{label:"ค่าบริการโรงภาพยนตร์",value:service,color:"#5a8abf"},{label:"ป๊อปคอร์น & เครื่องดื่ม",value:snack,color:"#5aaa6a"}].map(item=>`<div class="split-item"><div class="split-amount" style="color:${item.color}">฿${fmt(item.value)}</div><div class="split-label">${item.label}</div><div class="split-pct" style="color:${item.color}">${st>0?((item.value/st)*100).toFixed(1):0}%</div>${miniBar(item.value,st,item.color)}</div>`).join("")}</div></div>
    </div>`;
}

function renderEvents(data){
  const tS=data.reduce((s,d)=>s+d.seats,0),tR=data.reduce((s,d)=>s+d.total,0);
  document.getElementById("tab-events").innerHTML=`<div class="card" style="padding:0;overflow:hidden"><div class="tbl-wrap"><table>
    <thead><tr><th>#</th><th>วันที่</th><th>สถานะ</th><th>ชื่องาน</th><th>โรง</th><th>แผนก</th><th>ประเภท</th><th>เจ้าของ</th><th style="text-align:right">ที่นั่ง</th><th style="text-align:right">ค่าบัตร</th><th style="text-align:right">ค่าบริการ</th><th style="text-align:right">ป๊อปคอร์น</th><th style="text-align:right">รวม</th></tr></thead>
    <tbody>${data.map(e=>`<tr class="${isUpcoming(e)?"upcoming-row":""}">
      <td style="color:#c0a080">${e.id}</td>
      <td style="color:#a07840;white-space:nowrap">${e.date.slice(5).replace("-","/")}</td>
      <td>${isUpcoming(e)?'<span style="background:#f0e8dc3e0;color:#c9700c;border:1px solid #e8b870;border-radius:10px;font-size:10px;padding:2px 8px;font-weight:700">📅 กำลังมา</span>':'<span style="background:#f0f8f0;color:#5a8a5a;border:1px solid #a0c8a0;border-radius:10px;font-size:10px;padding:2px 8px;font-weight:700">✅ จัดแล้ว</span>'}</td>
      <td style="color:#3a2010;max-width:180px;line-height:1.3">${e.name}</td>
      <td style="color:#a07840;white-space:nowrap">${e.venue}</td>
      <td>${badge(e.dept,DEPT_COLOR[e.dept]||"#a09070")}</td>
      <td>${badge(e.type,TYPE_COLOR[e.type]||"#a09070")}</td>
      <td style="color:#a07840;white-space:nowrap">${e.owner}</td>
      <td style="text-align:right;color:#c0a070">${e.seats>0?e.seats:"-"}</td>
      <td style="text-align:right;color:${e.ticket>0?"#c9904c":"#d0c0a8"}">${e.ticket>0?"฿"+fmt(e.ticket):"-"}</td>
      <td style="text-align:right;color:${e.service>0?"#5a8abf":"#d0c0a8"}">${e.service>0?"฿"+fmt(e.service):"-"}</td>
      <td style="text-align:right;color:${e.snack>0?"#5aaa6a":"#d0c0a8"}">${e.snack>0?"฿"+fmt(e.snack):"-"}</td>
      <td style="text-align:right;font-weight:800;color:${e.total>0?"#8b5e1a":"#d0c0a8"}">${e.total>0?"฿"+fmt(e.total):"-"}</td>
    </tr>`).join("")}</tbody>
    <tfoot><tr><td colspan="8" style="padding:11px 13px;color:#8b5e1a;font-weight:700">รวม ${data.length} กิจกรรม</td><td style="padding:11px 13px;color:#c9904c;font-weight:700;text-align:right">${fmt(tS)}</td><td colspan="3"></td><td style="padding:11px 13px;color:#8b5e1a;font-weight:800;text-align:right">฿${fmt(tR)}</td></tr></tfoot>
  </table></div></div>`;
}

function renderAll(){
  const data=getFiltered();
  document.getElementById("total-count").textContent=data.length+" / "+RAW.length;
  renderOverview(data);renderMonthly(data);renderBreakdown(data);renderEvents(data);
}

document.querySelectorAll(".tab-btn").forEach(btn=>{btn.addEventListener("click",()=>{document.querySelectorAll(".tab-btn").forEach(b=>b.classList.remove("active"));document.querySelectorAll(".tab-panel").forEach(p=>p.classList.remove("active"));btn.classList.add("active");document.getElementById("tab-"+btn.dataset.tab).classList.add("active");});});

renderAll();
</script>
</body>
</html>
